stages:
  - build
  - test
  - deploy

variables:
  NODE_VERSION: "18"
  DOCKER_DRIVER: overlay2

# ── Build Web App ────────────────────────────────────────────────────
build-web:
  stage: build
  image: node:18-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  before_script:
    - npm ci
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour
  only:
    - master
    - main
    - merge_requests

# ── Build Android APK ────────────────────────────────────────────────
build-apk:
  stage: build
  image: ghcr.io/cirruslabs/android-sdk:34
  before_script:
    - apt-get update -q && apt-get install -y nodejs npm
    - npm ci
  script:
    - npm run build
    - npx cap copy android
    - cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon
  artifacts:
    name: "khetmap-apk-${CI_COMMIT_SHORT_SHA}"
    paths:
      - android/app/build/outputs/apk/debug/app-debug.apk
    expire_in: 30 days
  only:
    - master
    - tags

# ── Deploy to GitLab Pages ───────────────────────────────────────────
pages:
  stage: deploy
  image: node:18-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  before_script:
    - npm ci
  script:
    - npm run build
    - cp -r dist public
  artifacts:
    paths:
      - public
  only:
    - master
    - main

# ── Create GitLab Release ────────────────────────────────────────────
release-job:
  stage: deploy
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  script:
    - echo "Creating GitLab Release $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "KhetMap $CI_COMMIT_TAG"
    description: |
      ## 🌾 KhetMap $CI_COMMIT_TAG

      **Satellite intelligence for Indian farmers.**

      ### 📱 Android APK
      Download the APK from the artifacts section.

      ### 🌐 Web App
      https://khet-map.web.app

      See CHANGELOG.md for what's new.
  only:
    - tags
