name: 🌾 Build & Release KhetMap APK

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      release:
        description: 'Create GitHub release?'
        required: false
        default: 'false'

jobs:
  # ─── Job 1: Build Web App ──────────────────────────────────────
  build-web:
    name: Build React PWA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build production bundle
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_COPERNICUS_INSTANCE_ID: ${{ secrets.VITE_COPERNICUS_INSTANCE_ID }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: khetmap-web-dist
          path: dist/
          retention-days: 7

  # ─── Job 2: Build Android APK ─────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: build-web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Download built web dist
        uses: actions/download-artifact@v4
        with:
          name: khetmap-web-dist
          path: dist/

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Install Capacitor packages
        run: |
          npm install --save @capacitor/core @capacitor/android @capacitor/app @capacitor/haptics @capacitor/keyboard @capacitor/status-bar --legacy-peer-deps

      - name: Initialize Capacitor (if needed)
        run: |
          if [ ! -f capacitor.config.json ] && [ ! -f capacitor.config.ts ]; then
            npx cap init "KhetMap" "com.khetmap.app" --web-dir dist
          fi

      - name: Add Android platform (if needed)
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Sign APK (if keystore available)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks
          jarsigner -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore keystore.jks \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            android/app/build/outputs/apk/debug/app-debug.apk \
            "${{ secrets.KEY_ALIAS }}"

      - name: Rename APK
        run: |
          VERSION="${{ github.ref_name }}"
          if [[ "$VERSION" != v* ]]; then VERSION="latest"; fi
          cp android/app/build/outputs/apk/debug/app-debug.apk KhetMap-${VERSION}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: KhetMap-APK
          path: KhetMap-*.apk
          retention-days: 30

  # ─── Job 3: GitHub Release ─────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-android
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: KhetMap-APK

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "🌾 KhetMap ${{ github.ref_name }} — Satellite Farming Intelligence"
          body: |
            ## 🌾 KhetMap ${{ github.ref_name }}

            **अपना खेत, अपना नक्शा** — Your farm, your map.

            ### ✨ What's in this release
            - 🗺️ Draw & save field boundaries on satellite map
            - 🌿 NDVI crop health scoring (Sentinel-2)
            - 💧 SAR waterlogging detection (Sentinel-1)
            - 🤖 HARI AI crop advisor (Hindi/Hinglish voice + text)
            - 🌤️ Live weather + irrigation advice (Open-Meteo)
            - 📂 Import KML / GeoJSON / CSV boundaries
            - 📱 PWA — install directly from Chrome, no Play Store needed

            ### 📱 Install on Android
            **Option 1 (PWA — No install needed):**
            Open https://astonishing-begonia-79345d.netlify.app/ in Chrome → tap ⋮ → Add to Home Screen

            **Option 2 (APK):**
            Download `KhetMap-${{ github.ref_name }}.apk` below → Enable "Install from unknown sources" in Android settings → Install

            ### 🛰️ Powered by
            ESA Copernicus · Sentinel-2 · Sentinel-1 · NASA POWER · Open-Meteo · Firebase

            ---
            *Free forever for Indian farmers · Jai Kisan! 🙏*
          files: KhetMap-*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Job 4: Deploy to Netlify (web preview) ────────────────────
  deploy-web:
    name: Deploy Web to Netlify
    runs-on: ubuntu-latest
    needs: build-web
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: khetmap-web-dist
          path: dist/

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './dist'
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions — ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        continue-on-error: true
