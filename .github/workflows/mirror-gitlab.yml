name: 🦊 Mirror to GitLab

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  mirror:
    name: Mirror repository to GitLab
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔁 Push mirror to GitLab
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_USERNAME: ${{ secrets.GITLAB_USERNAME }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions Mirror"
          git remote add gitlab https://${GITLAB_USERNAME}:${GITLAB_TOKEN}@gitlab.com/${GITLAB_USERNAME}/khetmap.git || true
          git push gitlab --mirror --force
